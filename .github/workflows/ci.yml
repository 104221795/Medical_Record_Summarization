name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    env:
      RAG_ENVIRONMENT: test
      RAG_DATABASE_URL: sqlite+pysqlite:///./var/ci.db
      RAG_EMBEDDING_PROVIDER: hashing
      RAG_JOB_BACKEND: in_process
      RAG_AUTH_SECRET_KEY: ci-test-secret
      RAG_SENTENCE_TRANSFORMERS_LOCAL_FILES_ONLY: "true"
      RUN_REAL_BASELINES: "0"
      RAG_RUN_REAL_BASELINES: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run lightweight backend tests
        run: |
          python -m pytest backend/tests/test_deployment_smoke.py backend/tests/test_clinical_safety_layer.py -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_PREFIX: /api/v1
          VITE_API_BASE_URL: ""
        run: npm run build
