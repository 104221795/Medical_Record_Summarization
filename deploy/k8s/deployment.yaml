apiVersion: v1
kind: Namespace
metadata:
  name: clinical-ai
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clinical-summarizer-config
  namespace: clinical-ai
data:
  RAG_ENVIRONMENT: "production"
  RAG_EMBEDDING_PROVIDER: "sentence_transformers"
  RAG_SENTENCE_TRANSFORMERS_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  RAG_SENTENCE_TRANSFORMERS_LOCAL_FILES_ONLY: "true"
  RAG_ORT_EXECUTION_PROVIDER: "CPUExecutionProvider"
  RAG_ORT_INTRA_OP_THREADS: "2"
  RAG_GENERATOR_PROVIDER: "extractive"
  RAG_QDRANT_URL: "http://qdrant.clinical-ai.svc.cluster.local:6333"
  RAG_MLFLOW_ENABLED: "true"
  RAG_MLFLOW_TRACKING_URI: "http://mlflow.clinical-ai.svc.cluster.local:5000"
  RAG_MLFLOW_EXPERIMENT_NAME: "medical-record-summarization-prod"
  RAG_MLFLOW_LOG_REDACTED_SAFETY_ARTIFACTS: "true"
  RAG_MEDICAL_NLI_MODEL_PATH: "/models/deberta-v3-nli-small-onnx"
  RAG_MEDICAL_NLI_CONTRADICTION_THRESHOLD: "0.80"
  RAG_MEDICAL_NLI_REQUIRED_FOR_WRITEBACK: "true"
  RAG_WHISPER_MODEL: "openai/whisper-small"
  RAG_WHISPER_DEVICE: "-1"
  RAG_VIT_MODEL: "google/vit-base-patch16-224-in21k"
  RAG_VISION_DEVICE: "cpu"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinical-summarizer-api
  namespace: clinical-ai
  labels:
    app: clinical-summarizer-api
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: clinical-summarizer-api
  template:
    metadata:
      labels:
        app: clinical-summarizer-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: registry.example.local/clinical-summarizer:intel-v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: clinical-summarizer-config
          env:
            - name: RAG_QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clinical-summarizer-secrets
                  key: qdrant-api-key
                  optional: true
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 18
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime-tmp
              mountPath: /tmp
            - name: model-cache
              mountPath: /home/app/.cache
            - name: medical-nli-model
              mountPath: /models
              readOnly: true
      volumes:
        - name: runtime-tmp
          emptyDir: {}
        - name: model-cache
          emptyDir: {}
        - name: medical-nli-model
          persistentVolumeClaim:
            claimName: clinical-nli-model-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: clinical-summarizer-api
  namespace: clinical-ai
spec:
  selector:
    app: clinical-summarizer-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clinical-summarizer-api
  namespace: clinical-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clinical-summarizer-api
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
